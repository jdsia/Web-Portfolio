<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none">
  <!-- Outer sharp bouldering volume hold -->
  <polygon points="64,8 116,38 116,90 64,120 12,90 12,38" fill="#141414" stroke="#83a598" stroke-width="8" stroke-linejoin="round"/>
  <!-- Inner geometric facets -->
  <line x1="64" y1="8" x2="64" y2="120" stroke="#83a598" stroke-width="4" stroke-linecap="round" opacity="0.5"/>
  <line x1="12" y1="38" x2="116" y2="90" stroke="#83a598" stroke-width="4" stroke-linecap="round" opacity="0.5"/>
  <line x1="12" y1="90" x2="116" y2="38" stroke="#83a598" stroke-width="4" stroke-linecap="round" opacity="0.5"/>
  <!-- Central sharp diamond -->
  <polygon points="64,36 94,64 64,92 34,64" fill="#83a598" fill-opacity="0.8" stroke="#83a598" stroke-width="4" stroke-linejoin="round"/>
  <!-- 3D depth highlight facet -->
  <polygon points="64,36 64,92 34,64" fill="#ffffff" fill-opacity="0.15"/>
</svg>
